<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Eye: Website Build Brief</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-weight:400;
  background:#080808;
  color:rgba(255,255,255,.90);
  font-size:14px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 10% 30%,rgba(255,255,255,.018) 0%,transparent 100%),
    radial-gradient(ellipse 50% 70% at 90% 80%,rgba(255,255,255,.012) 0%,transparent 100%);
}

/* ISLAND */
.island{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  z-index:300;
  background:rgba(14,14,14,.88);
  backdrop-filter:blur(28px) saturate(1.4);
  -webkit-backdrop-filter:blur(28px) saturate(1.4);
  border:1px solid rgba(255,255,255,.11);
  border-radius:100px;
  padding:0 6px;
  height:48px;
  display:flex;align-items:center;gap:2px;
  box-shadow:0 2px 32px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06);
  white-space:nowrap;
}
.island-mark{
  font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.88);
  padding:0 16px 0 14px;
  border-right:1px solid rgba(255,255,255,.08);
  margin-right:4px;
}
.island-nav{display:flex;align-items:center;gap:2px}
.island-btn{
  font-size:11px;font-weight:400;letter-spacing:.02em;
  color:rgba(255,255,255,.45);
  padding:7px 14px;border-radius:100px;
  cursor:pointer;transition:all .2s;border:none;background:none;
  font-family:inherit;
}
.island-btn:hover,.island-btn.on{
  color:rgba(255,255,255,.92);
  background:rgba(255,255,255,.09);
}
.island-sep{width:1px;height:14px;background:rgba(255,255,255,.07);margin:0 4px}
.island-client{
  font-size:10px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.30);
  padding:0 14px 0 6px;margin-left:4px;
  border-left:1px solid rgba(255,255,255,.08);
}

/* HERO */
.hero{
  padding:140px 72px 80px;
  position:relative;z-index:1;
}
.hero-name{
  font-size:clamp(52px,9vw,96px);
  font-weight:300;
  color:rgba(255,255,255,.92);
  letter-spacing:-.04em;
  line-height:1;
  margin-bottom:14px;
}
.hero-sub{
  font-size:15px;font-weight:300;
  color:rgba(255,255,255,.32);
  letter-spacing:.03em;
}

/* SECTIONS */
.section{max-width:1200px;margin:0 auto;padding:80px 52px;position:relative;z-index:1}
.section-hdr{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:36px;
}
.section-lbl{
  font-size:9px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(255,255,255,.25);
}
.section-line{flex:1;height:1px;background:rgba(255,255,255,.06);margin-left:8px}

/* PAGE GRID */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}

/* GLASS CARD */
.gc{
  background:rgba(255,255,255,.048);
  backdrop-filter:blur(20px) saturate(1.2);
  -webkit-backdrop-filter:blur(20px) saturate(1.2);
  border:1px solid rgba(255,255,255,.09);
  border-radius:20px;padding:30px 26px 24px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:background .25s,border-color .25s,transform .25s,box-shadow .25s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.gc:hover{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.16);
  transform:translateY(-4px);
  box-shadow:0 20px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
}
.gc:hover .gc-cta{opacity:1;transform:translateX(0)}
.gc-title{font-size:20px;font-weight:500;color:rgba(255,255,255,.92);letter-spacing:-.02em;margin-bottom:6px;line-height:1.2}
.gc-desc{font-size:13px;font-weight:400;color:rgba(255,255,255,.38);margin-bottom:20px;letter-spacing:.01em}
.gc-list{list-style:none;margin-bottom:16px}
.gc-list li{
  font-size:12px;font-weight:400;color:rgba(255,255,255,.52);
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;gap:8px;line-height:1.45;
}
.gc-list li::before{content:'';width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.22);flex-shrink:0}
.gc-more{font-size:10px;font-weight:400;color:rgba(255,255,255,.25);margin-bottom:18px;font-style:italic;letter-spacing:.02em}
.gc-flags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.gc-flag{
  font-size:9px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;
  color:rgba(255,255,255,.38);
  border:1px solid rgba(255,255,255,.12);
  padding:3px 8px;border-radius:100px;
}
.gc-flag.solid{background:rgba(255,255,255,.90);color:#000;border-color:transparent}
.gc-cta{
  font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.58);display:flex;align-items:center;gap:5px;
  opacity:0;transform:translateX(-5px);transition:opacity .2s,transform .2s;
}

/* BOTTOM SHEET */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.on{opacity:1;pointer-events:all}
.sheet{
  position:fixed;bottom:0;left:0;right:0;height:74vh;
  background:rgba(12,12,12,.96);
  backdrop-filter:blur(32px) saturate(1.4);
  -webkit-backdrop-filter:blur(32px) saturate(1.4);
  border-top:1px solid rgba(255,255,255,.12);
  border-radius:24px 24px 0 0;
  box-shadow:0 -20px 60px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08);
  z-index:201;transform:translateY(100%);
  transition:transform .38s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
}
.sheet.on{transform:translateY(0)}
.sh-handle{
  width:40px;height:4px;border-radius:100px;
  background:rgba(255,255,255,.18);
  margin:14px auto 0;flex-shrink:0;
}
.sh-hdr{
  padding:22px 44px 18px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;flex-shrink:0;gap:20px;
}
.sh-n{
  font-size:12px;font-weight:400;color:rgba(255,255,255,.25);
  letter-spacing:.06em;font-variant-numeric:tabular-nums;
  padding-right:20px;border-right:1px solid rgba(255,255,255,.08);
}
.sh-info{flex:1}
.sh-title{font-size:20px;font-weight:400;color:rgba(255,255,255,.92);letter-spacing:-.01em}
.sh-desc{font-size:11px;font-weight:400;color:rgba(255,255,255,.32);margin-top:3px}
.sh-close{
  width:32px;height:32px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.10);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:rgba(255,255,255,.48);
  transition:all .15s;flex-shrink:0;
}
.sh-close:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.92)}
.sh-body{
  flex:1;overflow-y:auto;padding:32px 44px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:32px 40px;align-content:start;
}
.sh-body::-webkit-scrollbar{width:3px}
.sh-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:2px}
.ssec-t{
  font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.25);margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.ssec-ul{list-style:none;display:flex;flex-direction:column;gap:8px}
.ssec-ul li{
  font-size:12px;font-weight:400;color:rgba(255,255,255,.58);
  display:flex;align-items:flex-start;gap:8px;line-height:1.6;
}
.ssec-ul li::before{content:'';width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.20);flex-shrink:0;margin-top:7px}
.li-tag{
  font-size:8.5px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.12);padding:2px 6px;border-radius:100px;
  color:rgba(255,255,255,.38);white-space:nowrap;flex-shrink:0;
}
.li-tag.solid{background:rgba(255,255,255,.88);color:#000;border-color:transparent}

/* APP GRID */
.agrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.atile{
  background:rgba(255,255,255,.042);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:20px 18px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  transition:background .2s,border-color .2s;
}
.atile:hover{background:rgba(255,255,255,.075);border-color:rgba(255,255,255,.14)}
.atile-n{font-size:12.5px;font-weight:500;color:rgba(255,255,255,.85);margin-bottom:5px}
.atile-r{font-size:10.5px;font-weight:400;color:rgba(255,255,255,.35);line-height:1.5}

/* PROMO GRID */
.pgrd{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pcrd{
  background:rgba(255,255,255,.042);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:22px 22px;
  position:relative;overflow:hidden;
  transition:background .2s,border-color .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.pcrd:hover{background:rgba(255,255,255,.075);border-color:rgba(255,255,255,.14)}
.pcrd.ft{border-top:1px solid rgba(255,255,255,.25)}
.pcrd-bg{
  position:absolute;right:8px;bottom:-14px;
  font-size:58px;font-weight:200;color:rgba(255,255,255,.04);
  line-height:1;letter-spacing:-.04em;pointer-events:none;
  font-variant-numeric:tabular-nums;
}
.pcrd-code{
  font-family:'Courier New',monospace;font-size:13px;font-weight:500;
  color:rgba(255,255,255,.82);letter-spacing:.04em;margin-bottom:8px;
}
.pcrd-desc{font-size:11.5px;font-weight:400;color:rgba(255,255,255,.36);line-height:1.55}

/* PENDING */
.pendlist{display:flex;flex-direction:column;gap:10px}
.pitem{
  background:rgba(255,255,255,.042);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;padding:22px 26px;
  display:flex;gap:20px;align-items:flex-start;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
}
.pnum{
  font-size:10px;font-weight:400;color:rgba(255,255,255,.22);
  width:16px;flex-shrink:0;margin-top:4px;
  font-variant-numeric:tabular-nums;letter-spacing:.04em;
}
.ptitle{font-size:13px;font-weight:500;color:rgba(255,255,255,.85);margin-bottom:5px}
.pdesc{font-size:11.5px;font-weight:400;color:rgba(255,255,255,.38);line-height:1.7}

/* NOTES */
.sh-notes{
  flex-shrink:0;border-top:1px solid rgba(255,255,255,.06);
  padding:20px 44px 24px;background:rgba(255,255,255,.02);
}
.sh-notes-lbl{
  font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.25);margin-bottom:10px;display:block;
}
.sh-notes-ta{
  width:100%;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.10);
  border-radius:10px;
  color:rgba(255,255,255,.82);
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  font-size:12.5px;font-weight:400;line-height:1.6;
  padding:12px 14px;resize:none;height:72px;outline:none;
  transition:border-color .2s,background .2s;
}
.sh-notes-ta:focus{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07)}
.sh-notes-ta::placeholder{color:rgba(255,255,255,.20)}
.sh-notes-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.sh-notes-save{
  font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.58);background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.10);border-radius:100px;
  padding:7px 18px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.sh-notes-save:hover{background:rgba(255,255,255,.13);color:rgba(255,255,255,.90)}
.sh-notes-clear{
  font-size:10px;font-weight:400;letter-spacing:.06em;
  color:rgba(255,255,255,.22);background:none;border:none;
  cursor:pointer;font-family:inherit;padding:7px 4px;transition:color .15s;
}
.sh-notes-clear:hover{color:rgba(255,255,255,.55)}
.sh-notes-status{font-size:10px;font-weight:400;color:rgba(255,255,255,.30);margin-left:auto}
.gc-note{
  display:inline-flex;align-items:center;gap:5px;margin-top:12px;
  font-size:9.5px;font-weight:500;letter-spacing:.04em;
  color:rgba(255,255,255,.40);border:1px solid rgba(255,255,255,.10);
  border-radius:100px;padding:3px 10px;
}
.gc-note-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.50);flex-shrink:0}

/* MASTER SEND BUTTON */
.master-btn{
  position:fixed;bottom:32px;right:32px;z-index:150;
  background:rgba(255,255,255,.92);color:#000;
  font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  border:none;border-radius:100px;padding:14px 22px;
  cursor:pointer;
  box-shadow:0 8px 32px rgba(0,0,0,.5),0 2px 8px rgba(0,0,0,.3);
  transition:all .2s;display:flex;align-items:center;gap:8px;
}
.master-btn:hover{background:#fff;transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.6)}
.master-btn-dot{width:6px;height:6px;border-radius:50%;background:#000}

/* SEND MODAL */
.modal-wrap{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-wrap.on{opacity:1;pointer-events:all}
.modal{
  background:rgba(16,16,16,.97);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;padding:36px 40px;
  max-width:420px;width:90%;
  box-shadow:0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.08);
}
.modal-title{font-size:17px;font-weight:500;color:rgba(255,255,255,.92);margin-bottom:10px;letter-spacing:-.01em}
.modal-body{font-size:12.5px;font-weight:400;color:rgba(255,255,255,.40);line-height:1.75;margin-bottom:28px}
.modal-none{font-size:12.5px;font-weight:400;color:rgba(255,255,255,.35);margin-bottom:28px;font-style:italic}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-cancel{
  font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.38);background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);border-radius:100px;
  padding:9px 20px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-cancel:hover{color:rgba(255,255,255,.70);background:rgba(255,255,255,.10)}
.modal-confirm{
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:#000;background:rgba(255,255,255,.92);
  border:1px solid transparent;border-radius:100px;
  padding:9px 20px;cursor:pointer;font-family:inherit;transition:all .15s;
}
.modal-confirm:hover{background:#fff}

/* IMPORT PANEL */
.import-wrap{
  position:fixed;bottom:32px;left:32px;z-index:150;
}
.import-btn{
  font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
  color:rgba(255,255,255,.35);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);border-radius:100px;
  padding:10px 18px;cursor:pointer;transition:all .2s;
}
.import-btn:hover{color:rgba(255,255,255,.70);background:rgba(255,255,255,.09)}
.import-box{
  background:rgba(14,14,14,.97);
  border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:20px;margin-bottom:8px;width:280px;
  box-shadow:0 16px 48px rgba(0,0,0,.6);
  display:none;
}
.import-box.on{display:block}
.import-box-lbl{font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:8px;display:block}
.import-ta{
  width:100%;height:80px;resize:none;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);
  border-radius:8px;color:rgba(255,255,255,.75);
  font-family:'Courier New',monospace;font-size:10px;
  padding:8px 10px;outline:none;
}
.import-go{
  margin-top:8px;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:#000;background:rgba(255,255,255,.90);border:none;border-radius:100px;
  padding:7px 16px;cursor:pointer;font-family:inherit;width:100%;
}

/* FOOTER */
.footer{
  border-top:1px solid rgba(255,255,255,.06);
  padding:36px 52px;
  display:flex;align-items:center;justify-content:space-between;
  margin-top:40px;position:relative;z-index:1;
}
.footer-l{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.28)}
.footer-r{font-size:10px;font-weight:400;color:rgba(255,255,255,.18);letter-spacing:.04em}

@media(max-width:960px){
  .pgrid{grid-template-columns:repeat(2,1fr)}
  .agrid{grid-template-columns:repeat(3,1fr)}
  .pgrd{grid-template-columns:repeat(2,1fr)}
  .section{padding:64px 28px}
  .island{max-width:calc(100vw - 32px)}
}
@media(max-width:640px){
  .pgrid,.agrid,.pgrd{grid-template-columns:1fr}
  .hero{padding:0 32px}
  .hero-name{font-size:clamp(56px,16vw,80px)}
  .island-btn{display:none}
}
</style>
</head>
<body>

<!-- ISLAND -->
<div class="island">
  <span class="island-mark">Ardent</span>
  <nav class="island-nav">
    <button class="island-btn on" onclick="scrollTo('#pages')">Pages</button>
    <button class="island-btn" onclick="scrollTo('#apps')">Apps</button>
    <button class="island-btn" onclick="scrollTo('#promos')">Promotions</button>
  </nav>
  <span class="island-sep"></span>
  <span class="island-client">Bird Eye</span>
</div>

<!-- HERO -->
<section class="hero" id="top">
  <div class="hero-name">Bird Eye</div>
  <div class="hero-sub">x Ardent: Website</div>
</section>

<!-- PAGES -->
<section class="section" id="pages">
  <div class="section-hdr">
    <span class="section-lbl">Pages</span>
    <div class="section-line"></div>
  </div>
  <div class="pgrid" id="pageGrid"></div>
</section>

<!-- APPS -->
<section class="section" id="apps">
  <div class="section-hdr">
    <span class="section-lbl">App Stack</span>
    <div class="section-line"></div>
  </div>
  <div class="agrid" id="appsGrid"></div>
</section>

<!-- PROMOS -->
<section class="section" id="promos">
  <div class="section-hdr">
    <span class="section-lbl">Promotions and Discounts</span>
    <div class="section-line"></div>
  </div>
  <div class="pgrd" id="promoGrid"></div>
</section>


<footer class="footer">
  <span class="footer-l">Ardent</span>
  <span class="footer-r">Prepared for Bird Eye &nbsp;&middot;&nbsp; June 2026</span>
</footer>

<!-- MASTER SEND -->
<button class="master-btn" onclick="showSendModal()">
  <span class="master-btn-dot"></span>Send to Ardent
</button>

<!-- IMPORT (for Ardent) -->
<div class="import-wrap">
  <div class="import-box" id="importBox">
    <span class="import-box-lbl">Paste notes JSON to import</span>
    <textarea class="import-ta" id="importTa" placeholder='[{"page":"Home","note":"..."}]'></textarea>
    <button class="import-go" onclick="importNotes()">Import Notes</button>
  </div>
  <button class="import-btn" onclick="toggleImport()">Import Notes</button>
</div>

<!-- SEND MODAL -->
<div class="modal-wrap" id="sendModal">
  <div class="modal">
    <div class="modal-title">Send to Ardent</div>
    <div class="modal-body" id="modalBody">All saved notes will be compiled and sent to Ardent for review. Please allow 30 minutes before submitting a new note.</div>

function pad(n){return n<10?'0'+n:''+n}
function liTag(i){
  if(i.a)return' <span class="li-tag solid">'+i.a+'</span>';
  if(i.d)return' <span class="li-tag solid">Custom Build</span>';
  if(i.x)return' <span class="li-tag">'+i.x+'</span>';
  return'';
}

(function(){
  var g=document.getElementById('pageGrid');
  g.innerHTML=PAGES.map(function(p){
    var prev=p.prev.slice(0,4).map(function(i){return'<li>'+i+'</li>';}).join('');
    var rem=(p.prev.length-4)+(p.more||0);
    var more=rem>0?'<div class="gc-more">+'+rem+' more</div>':'';
    var flags=p.flags.length?'<div class="gc-flags">'+p.flags.map(function(f){return'<span class="gc-flag'+(f==='Custom Build'?' solid':'')+'">'+f+'</span>';}).join('')+'</div>':'';
    return'<div class="gc" onclick="openSheet('+(p.n-1)+')">'
      +'<div class="gc-title">'+p.title+'</div>'
      +'<div class="gc-desc">'+p.desc+'</div>'
      +'<ul class="gc-list">'+prev+'</ul>'
      +more+flags
      +'<div class="gc-cta">Open &#8594;</div>'
      +'</div>';
  }).join('');
})();

var currentIdx=0;

function openSheet(idx){
  currentIdx=idx;
  var p=PAGES[idx];
  document.getElementById('shN').textContent=pad(p.n);
  document.getElementById('shTitle').textContent=p.title;
  document.getElementById('shDesc').textContent=p.desc;
  document.getElementById('shBody').innerHTML=p.secs.map(function(s){
    return'<div><div class="ssec-t">'+s.t+'</div><ul class="ssec-ul">'
      +s.li.map(function(i){return'<li>'+i.v+liTag(i)+'</li>';}).join('')+'</ul></div>';
  }).join('');
  var saved=localStorage.getItem('be_note_'+idx)||'';
  document.getElementById('shNotesTa').value=saved;
  document.getElementById('shNotesStatus').textContent=saved?'Note saved':'';
  document.getElementById('sheet').classList.add('on');
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function saveNote(){
  var note=document.getElementById('shNotesTa').value.trim();
  if(note){localStorage.setItem('be_note_'+currentIdx,note);}
  else{localStorage.removeItem('be_note_'+currentIdx);}
  updateBadge(currentIdx);
  var s=document.getElementById('shNotesStatus');
  s.textContent='Saved';
  setTimeout(function(){s.textContent=note?'Note saved':'';},1800);
}

function showSendModal(){
  var hasNotes=PAGES.some(function(_,i){return!!localStorage.getItem('be_note_'+i);});
  var body=document.getElementById('modalBody');
  var confirm=document.getElementById('modalConfirm');
  if(!hasNotes){
    body.textContent='No notes have been saved yet. Add notes to pages before sending.';
    confirm.style.display='none';
  } else {
    body.textContent='All saved notes will be compiled and sent to Ardent for review. Please allow 30 minutes before submitting a new note.';
    confirm.style.display='';
  }
  document.getElementById('sendModal').classList.add('on');
}

function closeSendModal(){
  document.getElementById('sendModal').classList.remove('on');
}

function confirmSend(){
  var notes=[];
  PAGES.forEach(function(p,i){
    var note=localStorage.getItem('be_note_'+i);
    if(note)notes.push({page:p.title,note:note});
  });
  var readable='Bird Eye: Website Notes\nSubmitted: '+new Date().toLocaleString()+'\n\n';
  notes.forEach(function(n){readable+='---\n'+n.page.toUpperCase()+'\n'+n.note+'\n\n';});
  readable+='\n\n--- IMPORT DATA ---\n'+JSON.stringify(notes);
  var subject=encodeURIComponent('Bird Eye: Website Notes');
  var body=encodeURIComponent(readable);
  closeSendModal();
  window.location.href='mailto:shivamrmahtani@gmail.com?subject='+subject+'&body='+body;
}

function toggleImport(){
  var box=document.getElementById('importBox');
  box.classList.toggle('on');
}

function importNotes(){
  try{
    var data=JSON.parse(document.getElementById('importTa').value.trim());
    data.forEach(function(item){
      var idx=PAGES.findIndex(function(p){return p.title===item.page;});
      if(idx>-1&&item.note){localStorage.setItem('be_note_'+idx,item.note);}
    });
    loadBadges();
    document.getElementById('importBox').classList.remove('on');
    document.getElementById('importTa').value='';
  } catch(e){alert('Invalid notes data. Please paste the full import block from the email.');}
}

function clearNote(){
  document.getElementById('shNotesTa').value='';
  localStorage.removeItem('be_note_'+currentIdx);
  updateBadge(currentIdx);
  document.getElementById('shNotesStatus').textContent='';
}

function updateBadge(idx){
  var cards=document.querySelectorAll('.gc');
  if(!cards[idx])return;
  var existing=cards[idx].querySelector('.gc-note');
  var note=localStorage.getItem('be_note_'+idx);
  if(note&&!existing){
    var b=document.createElement('div');
    b.className='gc-note';
    b.innerHTML='<span class="gc-note-dot"></span>Note';
    cards[idx].appendChild(b);
  } else if(!note&&existing){
    existing.remove();
  }
}

function loadBadges(){
  PAGES.forEach(function(_,i){updateBadge(i);});
}
loadBadges();
function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  document.body.style.overflow='';
}
function scrollTo(id){
  document.querySelector(id).scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.island-btn').forEach(function(b){b.classList.remove('on')});
  event.target.classList.add('on');
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});
var btns=document.querySelectorAll('.island-btn');
var secs=['#pages','#apps','#promos'];
window.addEventListener('scroll',function(){
  var y=window.scrollY+200;
  secs.forEach(function(id,i){
    var el=document.querySelector(id);
    if(el&&el.offsetTop<=y){
      btns.forEach(function(b){b.classList.remove('on')});
      if(btns[i])btns[i].classList.add('on');
    }
  });
},{passive:true});
